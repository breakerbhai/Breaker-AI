<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Breaker AI · Single Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F1A;
    --sidebar-bg:#0D1220;
    --card-bg:rgba(255,255,255,0.035);
    --card-bg-hover:rgba(255,255,255,0.06);
    --border:#242A3A;
    --text-1:#F4F6FB;
    --text-2:#8A93A8;
    --text-3:#4F5871;
    --cyan:#22D3EE;
    --cyan-soft:#67E8F9;
    --cyan-dim:rgba(34,211,238,.12);

    --gpt5:#34D399;
    --claude:#F0876E;
    --gemini:#8B8FF5;
    --deepseek:#4D9FFF;
    --grok:#C7CBDA;
    --mistral:#FF9B4D;

    --ease:cubic-bezier(.16,.8,.24,1);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg); color:var(--text-1);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    overflow:hidden;
  }
  button{ font-family:inherit; cursor:pointer; }
  input{ font-family:inherit; }

  .app{ display:flex; height:100vh; height:100dvh; height:calc(var(--app-height, 100vh)); position:relative; }
  .app::before{
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(55% 45% at 68% 12%, rgba(34,211,238,.10), transparent 70%),
      radial-gradient(40% 35% at 10% 85%, rgba(139,92,246,.07), transparent 70%);
  }

  /* ============ SIDEBAR ============ */
  .sidebar{
    width:272px; min-width:272px; height:100%; background:var(--sidebar-bg);
    border-right:1px solid var(--border); display:flex; flex-direction:column;
    position:relative; z-index:2;
    transition:transform .28s var(--ease);
  }
  .sidebar-close-btn{ display:none; }
  .sidebar-backdrop{ display:none; }
  .mobile-menu-btn{ display:none; }

  .sidebar-header{ padding:22px 18px 16px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .sidebar-header-text{ flex:1; min-width:0; }
  .sidebar-title{
    font-size:11.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--text-3); margin-bottom:12px;
  }

  .model-dd{ position:relative; }
  .model-dd-trigger{
    width:100%; display:flex; align-items:center; gap:10px; padding:9px 10px 9px 9px;
    background:var(--card-bg); border:1px solid var(--border); border-radius:12px;
    transition:border-color .18s var(--ease), background .18s var(--ease);
  }
  .model-dd-trigger:hover, .model-dd-trigger.open{ background:var(--card-bg-hover); border-color:var(--accent-active, var(--cyan)); }
  .model-dd-trigger .mini-roundel{ width:26px; height:26px; }
  .model-dd-trigger .dd-label{ flex:1; text-align:left; font-size:13.5px; font-weight:700; }
  .model-dd-trigger .chev{ color:var(--text-2); transition:transform .2s var(--ease); flex-shrink:0; }
  .model-dd-trigger.open .chev{ transform:rotate(180deg); }

  .model-dd-menu{
    position:absolute; top:calc(100% + 8px); left:0; right:0; z-index:40;
    background:#10162A; border:1px solid var(--border); border-radius:14px;
    box-shadow:0 24px 48px -12px rgba(0,0,0,.6); padding:6px;
    opacity:0; transform:translateY(-6px) scale(.98); pointer-events:none;
    transition:opacity .16s var(--ease), transform .16s var(--ease);
  }
  .model-dd-menu.open{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .model-dd-item{
    width:100%; display:flex; align-items:center; gap:10px; padding:9px 9px; border-radius:9px;
    background:none; border:none; color:var(--text-1); text-align:left;
    transition:background .12s var(--ease);
  }
  .model-dd-item:hover{ background:rgba(255,255,255,.05); }
  .model-dd-item .mini-roundel{ width:24px; height:24px; }
  .model-dd-item .name{ font-size:13px; font-weight:600; flex:1; }
  .model-dd-item .check{ width:14px; height:14px; opacity:0; color:var(--accent-item, var(--cyan)); }
  .model-dd-item.active .check{ opacity:1; }

  .mini-roundel{
    border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    background:linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.015));
    border:1px solid rgba(255,255,255,.08);
  }
  .mini-roundel svg{ width:60%; height:60%; }

  .model-list{ flex:1; overflow-y:auto; padding:14px 12px; display:flex; flex-direction:column; gap:3px; }
  .model-list-label{
    font-size:10.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase;
    color:var(--text-3); padding:4px 8px 8px;
  }
  .model-row{
    display:flex; align-items:center; gap:11px; padding:9px 10px; border-radius:11px;
    background:none; border:1px solid transparent; width:100%; text-align:left;
    transition:background .16s var(--ease), border-color .16s var(--ease), transform .12s var(--ease);
  }
  .model-row:hover{ background:rgba(255,255,255,.035); }
  .model-row.active{
    background:var(--card-bg-hover);
    border-color:color-mix(in srgb, var(--accent-item, var(--cyan)) 45%, transparent);
    box-shadow:0 0 0 1px color-mix(in srgb, var(--accent-item, var(--cyan)) 20%, transparent) inset,
               0 0 22px -8px var(--accent-shadow, rgba(34,211,238,.5));
  }
  .model-row .mini-roundel{ width:32px; height:32px; }
  .model-row-text{ flex:1; min-width:0; }
  .model-row-name{ font-size:13.5px; font-weight:600; }
  .model-row-provider{ font-size:10.5px; color:var(--text-3); margin-top:1px; }
  .active-dot{
    width:7px; height:7px; border-radius:50%; background:var(--accent-item, var(--cyan)); flex-shrink:0;
    box-shadow:0 0 8px 1px var(--accent-shadow, rgba(34,211,238,.7));
    opacity:0;
  }
  .model-row.active .active-dot{ opacity:1; }

  /* coming-soon state — dimmed, badge instead of provider glow, not selectable */
  .model-row.coming-soon{ opacity:.5; cursor:not-allowed; }
  .model-row.coming-soon:hover{ background:none; }
  .model-row.coming-soon .mini-roundel{ filter:grayscale(.6); }
  .model-dd-item.coming-soon{ opacity:.5; cursor:not-allowed; }
  .model-dd-item.coming-soon:hover{ background:none; }
  .model-dd-item.coming-soon .mini-roundel{ filter:grayscale(.6); }
  .soon-badge{
    font-size:9.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
    padding:3px 7px; border-radius:999px; flex-shrink:0; white-space:nowrap;
    background:rgba(255,255,255,.05); color:var(--text-3); border:1px solid var(--border);
  }
  .soon-toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(10px);
    background:#10162A; border:1px solid var(--border); color:var(--text-1);
    font-size:12.5px; font-weight:600; padding:10px 16px; border-radius:999px;
    box-shadow:0 16px 40px -14px rgba(0,0,0,.7);
    opacity:0; pointer-events:none; transition:opacity .18s var(--ease), transform .18s var(--ease);
    z-index:100;
  }
  .soon-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .sidebar-footer{
    padding:14px 18px; border-top:1px solid var(--border); font-size:11px; color:var(--text-3);
    display:flex; align-items:center; gap:8px;
  }
  .sidebar-footer .dot{ width:6px; height:6px; border-radius:50%; background:#34D399; box-shadow:0 0 6px 1px rgba(52,211,153,.6); }

  /* ============ MAIN ============ */
  .main{ flex:1; display:flex; flex-direction:column; height:100%; position:relative; z-index:2; min-width:0; }

  .main-top{ padding:20px 32px 0; display:flex; justify-content:center; }
  .tagline-badge{
    display:inline-flex; align-items:center; gap:8px; padding:6px 14px 6px 10px; border-radius:999px;
    background:rgba(255,255,255,.04); border:1px solid var(--border);
    font-size:11.5px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text-2);
  }
  .tagline-badge .dot{ width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px 2px rgba(34,211,238,.7); }

  .chat-center{ flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 32px; overflow-y:auto; }

  .composer-card{
    width:100%; max-width:640px; background:var(--card-bg); border:1px solid var(--border); border-radius:22px;
    padding:22px 22px 18px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    box-shadow:0 30px 60px -30px rgba(0,0,0,.6);
    transition:border-color .2s var(--ease), box-shadow .2s var(--ease);
  }
  .composer-card:focus-within{
    border-color:rgba(34,211,238,.4);
    box-shadow:0 0 0 1px rgba(34,211,238,.2), 0 30px 60px -30px rgba(0,0,0,.6);
  }
  .composer-input{
    width:100%; background:transparent; border:none; outline:none; color:var(--text-1);
    font-size:16.5px; font-weight:500; padding:6px 2px 16px;
  }
  .composer-input::placeholder{ color:var(--text-3); }

  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; padding-bottom:18px; }
  .chip{
    display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:500; color:var(--text-2);
    padding:8px 13px; border-radius:999px; background:rgba(255,255,255,.04); border:1px solid var(--border);
    transition:border-color .16s var(--ease), color .16s var(--ease), background .16s var(--ease);
  }
  .chip:hover{ border-color:rgba(34,211,238,.4); color:var(--text-1); background:rgba(34,211,238,.06); }
  .chip svg{ width:13px; height:13px; opacity:.7; flex-shrink:0; }

  .composer-actions{ display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--border); padding-top:14px; }
  .composer-hint{ font-size:11.5px; color:var(--text-3); display:flex; align-items:center; gap:6px; }
  .composer-hint .mini-roundel{ width:18px; height:18px; }
  .btn-row{ display:flex; gap:8px; }
  .btn{
    display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700;
    padding:9px 16px; border-radius:11px; border:none; font-family:inherit;
    transition:transform .14s var(--ease), box-shadow .18s var(--ease), filter .14s var(--ease);
  }
  .btn:active{ transform:scale(.95); }
  .btn-ask{ color:#04141A; background:linear-gradient(135deg, var(--cyan-soft), var(--cyan) 65%, #38BDF8); box-shadow:0 8px 22px -8px rgba(34,211,238,.55); }
  .btn-ask:hover{ filter:brightness(1.08); }
  .btn-break{ color:var(--cyan-soft); background:rgba(34,211,238,.08); border:1px solid rgba(34,211,238,.3); }
  .btn-break:hover{ background:rgba(34,211,238,.14); }

  /* ============ CHAT THREAD ============ */
  .chat-thread{
    display:none; flex-direction:column; gap:16px;
    width:100%; max-width:640px; padding:8px 0 12px;
  }
  .chat-thread.active{ display:flex; }
  .chat-center.has-messages{ justify-content:flex-start; }

  .msg{ display:flex; flex-direction:column; gap:5px; max-width:84%; animation:msgIn .22s var(--ease); }
  .msg-user{ align-self:flex-end; align-items:flex-end; }
  .msg-ai{ align-self:flex-start; align-items:flex-start; }

  .msg-meta{ display:flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:var(--text-3); padding:0 2px; }
  .msg-meta .mini-roundel{ width:16px; height:16px; flex-shrink:0; }

  .msg-bubble{
    padding:12px 16px; border-radius:16px; font-size:14.5px; line-height:1.6;
    white-space:pre-wrap; word-wrap:break-word;
  }
  .msg-user .msg-bubble{
    background:linear-gradient(135deg, rgba(34,211,238,.18), rgba(34,211,238,.08));
    border:1px solid rgba(34,211,238,.28); color:var(--text-1); border-bottom-right-radius:4px;
  }
  .msg-ai .msg-bubble{
    background:var(--card-bg); border:1px solid var(--border); color:var(--text-1); border-bottom-left-radius:4px;
  }
  .msg-ai.msg-error .msg-bubble{
    border-color:rgba(240,90,90,.4); background:rgba(240,90,90,.08); color:#FFB4B4;
  }

  .msg-typing .msg-bubble{ display:flex; gap:5px; align-items:center; padding:14px 18px; }
  .typing-dot{ width:6px; height:6px; border-radius:50%; background:var(--text-2); animation:typingBounce 1.1s infinite ease-in-out; }
  .typing-dot:nth-child(2){ animation-delay:.15s; }
  .typing-dot:nth-child(3){ animation-delay:.3s; }
  @keyframes typingBounce{ 0%,60%,100%{ transform:translateY(0); opacity:.4; } 30%{ transform:translateY(-4px); opacity:1; } }
  @keyframes msgIn{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }

  .disclaimer{ text-align:center; font-size:11px; color:var(--text-3); padding:2px 32px 14px; }

  /* bottom persistent reply bar */
  .reply-dock{ padding:0 32px 22px; }
  .reply-bar{
    max-width:640px; margin:0 auto; display:flex; align-items:center; gap:10px;
    background:rgba(15,20,34,.85); border:1px solid var(--border); border-radius:16px;
    padding:6px 6px 6px 16px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    transition:border-color .18s var(--ease);
  }
  .reply-bar:focus-within{ border-color:rgba(34,211,238,.4); }
  .reply-bar input{
    flex:1; background:transparent; border:none; outline:none; color:var(--text-1); font-size:13.5px; padding:10px 0;
  }
  .reply-bar input::placeholder{ color:var(--text-3); }
  .thinking-pill{
    display:flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; color:var(--text-2);
    background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:999px; padding:7px 11px;
    white-space:nowrap; transition:border-color .16s var(--ease), color .16s var(--ease), background .16s var(--ease);
  }
  .thinking-pill:hover{ border-color:rgba(34,211,238,.4); color:var(--cyan-soft); background:rgba(34,211,238,.08); }
  .reply-send{
    width:34px; height:34px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--cyan-soft), var(--cyan)); color:#04141A; border:none;
  }

  @media (prefers-reduced-motion: reduce){ *{ transition-duration:.001ms !important; } }

  /* ============ MOBILE: sidebar becomes an off-canvas drawer ============ */
  @media (max-width: 820px){
    .app{ overflow:hidden; }
    .sidebar{
      position:fixed; top:0; left:0; z-index:60;
      transform:translateX(-100%);
      box-shadow:0 0 60px rgba(0,0,0,.6);
    }
    .sidebar.open{ transform:translateX(0); }
    .sidebar-close-btn{
      display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:9px;
      background:rgba(255,255,255,.04); border:1px solid var(--border); color:var(--text-2); flex-shrink:0;
      transition:background .16s var(--ease), color .16s var(--ease);
    }
    .sidebar-close-btn:hover{ background:rgba(255,255,255,.08); color:var(--text-1); }

    .sidebar-backdrop{
      display:none; position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.55);
      opacity:0; transition:opacity .22s var(--ease);
    }
    .sidebar-backdrop.show{ display:block; opacity:1; }

    .mobile-menu-btn{
      display:flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:11px;
      background:rgba(255,255,255,.04); border:1px solid var(--border); color:var(--text-2); flex-shrink:0;
      position:absolute; left:20px; top:20px;
      transition:background .16s var(--ease), color .16s var(--ease);
    }
    .mobile-menu-btn:hover{ background:rgba(255,255,255,.08); color:var(--text-1); }

    .main-top{ position:relative; }
    .composer-card{ max-width:100%; }
    .reply-bar{ max-width:100%; }
    .btn-row .btn span, .btn-row .btn{ white-space:nowrap; }
  }
  @media (max-width: 480px){
    .composer-card{ padding:18px 16px 14px; }
    .composer-input{ font-size:15px; }
    .chip{ font-size:11.5px; padding:7px 11px; }
    .main-top{ padding:18px 16px 0; }
    .chat-center{ padding:18px 16px; }
    .disclaimer{ padding:2px 16px 12px; font-size:10.5px; }
    .reply-dock{ padding:0 16px 18px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-text">
        <div class="sidebar-title">Single Model</div>
        <div class="model-dd" id="modelDD">
          <button class="model-dd-trigger" id="ddTrigger">
            <span class="mini-roundel" id="ddIconHost"></span>
            <span class="dd-label" id="ddLabel">Claude</span>
            <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="model-dd-menu" id="ddMenu"></div>
        </div>
      </div>
      <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="model-list" id="modelList">
      <div class="model-list-label">All models</div>
      <!-- rows injected by JS -->
    </div>

    <div class="sidebar-footer"><span class="dot"></span> Connected · Local session</div>
  </div>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <div class="main-top">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open model list">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
      <div class="tagline-badge"><span class="dot"></span> Breaker AI</div>
    </div>

    <div class="chat-center" id="chatCenter">
      <div class="chat-thread" id="chatThread"></div>
      <div class="composer-card" id="composerCard">
        <textarea class="composer-input" rows="2" placeholder="Ask anything — code, writing, research, or just a quick question." id="mainInput"></textarea>
        <div class="chip-row">
          <button class="chip" data-fill="Explain quantum computing">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/><ellipse cx="12" cy="12" rx="9" ry="3.6"/><ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(120 12 12)"/></svg>
            Explain quantum computing
          </button>
          <button class="chip" data-fill="Break down a complex topic simply">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"/></svg>
            Break down a complex topic simply
          </button>
        </div>
        <div class="composer-actions">
          <div class="composer-hint">
            <span class="mini-roundel" id="hintIconHost"></span>
            <span>Answering as <strong id="hintModelName" style="color:var(--text-1)">Claude</strong></span>
          </div>
          <div class="btn-row">
            <button class="btn btn-break" id="breakBtn">Break</button>
            <button class="btn btn-ask" id="askBtn">Ask
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="disclaimer">Breaker AI can make mistakes. Consider checking important information.</div>

    <div class="reply-dock">
      <div class="reply-bar">
        <input type="text" id="replyInput" placeholder="Reply to Claude..." aria-label="Reply input" />
        <button class="thinking-pill" id="thinkingPill">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Sonnet 5 Thinking
        </button>
        <button class="reply-send" aria-label="Send reply">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
/* Same icon grammar across the whole app: 1.75px rounded stroke, 0 0 48 48 viewBox. */
const ICONS = {
  gpt5: `<svg viewBox="0 0 48 48" fill="none">
    <rect x="10" y="10" width="28" height="28" rx="7" stroke="currentColor" stroke-width="1.9"/>
    <path d="M14 16 L10 16 M14 24 L9 24 M14 32 L10 32 M34 16 L38 16 M34 24 L39 24 M34 32 L38 32
             M16 14 L16 10 M24 14 L24 9 M32 14 L32 10 M16 34 L16 38 M24 34 L24 39 M32 34 L32 38"
      stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>

const MODELS = [
  { id:'gpt5',     name:'GPT-5',     provider:'OpenAI',     accent:'var(--gpt5)',     shadow:'rgba(52,211,153,.4)',  live:true  },
  { id:'claude',   name:'Claude',    provider:'Anthropic',  accent:'var(--claude)',   shadow:'rgba(240,135,110,.4)', live:true  },
  { id:'gemini',   name:'Gemini',    provider:'Google',     accent:'var(--gemini)',   shadow:'rgba(139,143,245,.4)', live:true  },
  { id:'deepseek', name:'DeepSeek',  provider:'DeepSeek',   accent:'var(--deepseek)', shadow:'rgba(77,159,255,.4)',  live:true  },
  { id:'grok',     name:'Grok',      provider:'xAI',        accent:'var(--grok)',     shadow:'rgba(199,203,218,.4)', live:false },
  { id:'mistral',  name:'Mistral',   provider:'Mistral AI', accent:'var(--mistral)',  shadow:'rgba(255,155,77,.4)',  live:false },
];

/* ---------- reliable mobile viewport height fix ---------- */
function setAppHeight(){
  document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
}
setAppHeight();
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', setAppHeight);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', setAppHeight);
}

let activeId = 'claude';

function roundelHTML(m, sizeClass){
  return `<span class="mini-roundel ${sizeClass||''}" style="color:${m.accent}">${ICONS[m.id]}</span>`;
}

/* ---------- sidebar list ---------- */
const modelList = document.getElementById('modelList');
MODELS.forEach(m => {
  const row = document.createElement('button');
  row.className = 'model-row' + (m.live ? '' : ' coming-soon');
  row.dataset.id = m.id;
  row.style.setProperty('--accent-item', m.accent);
  row.style.setProperty('--accent-shadow', m.shadow);
  if (!m.live) row.disabled = false; // stays focusable/tappable so the tooltip/toast can fire
  row.innerHTML = `
    <span class="mini-roundel" style="color:${m.accent}">${ICONS[m.id]}</span>
    <div class="model-row-text">
      <div class="model-row-name">${m.name}</div>
      <div class="model-row-provider">${m.provider}</div>
    </div>
    ${m.live ? '<span class="active-dot"></span>' : '<span class="soon-badge">Coming Soon</span>'}
  `;
  row.addEventListener('click', () => {
    if (!m.live) { showSoonToast(m.name); return; }
    setActive(m.id);
  });
  modelList.appendChild(row);
});

/* ---------- header dropdown ---------- */
const ddTrigger = document.getElementById('ddTrigger');
const ddMenu = document.getElementById('ddMenu');
MODELS.forEach(m => {
  const item = document.createElement('button');
  item.className = 'model-dd-item' + (m.live ? '' : ' coming-soon');
  item.dataset.id = m.id;
  item.style.setProperty('--accent-item', m.accent);
  item.innerHTML = `
    <span class="mini-roundel" style="color:${m.accent}">${ICONS[m.id]}</span>
    <span class="name">${m.name}</span>
    ${m.live
      ? '<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
      : '<span class="soon-badge">Soon</span>'}
  `;
  item.addEventListener('click', () => {
    if (!m.live) { showSoonToast(m.name); return; }
    setActive(m.id); closeDD();
  });
  ddMenu.appendChild(item);
});

/* ---------- "coming soon" toast ---------- */
let soonToastTimer = null;
function showSoonToast(name){
  let el = document.getElementById('soonToast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'soonToast';
    el.className = 'soon-toast';
    document.body.appendChild(el);
  }
  el.textContent = `${name} is coming soon`;
  el.classList.add('show');
  clearTimeout(soonToastTimer);
  soonToastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function openDD(){ ddTrigger.classList.add('open'); ddMenu.classList.add('open'); }
function closeDD(){ ddTrigger.classList.remove('open'); ddMenu.classList.remove('open'); }
ddTrigger.addEventListener('click', (e) => { e.stopPropagation(); ddMenu.classList.contains('open') ? closeDD() : openDD(); });
document.addEventListener('click', (e) => { if (!document.getElementById('modelDD').contains(e.target)) closeDD(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDD(); });

/* ---------- sync everything to active model ---------- */
function setActive(id){
  activeId = id;
  const m = MODELS.find(x => x.id === id);

  document.querySelectorAll('.model-row').forEach(r => r.classList.toggle('active', r.dataset.id === id));
  document.querySelectorAll('.model-dd-item').forEach(it => it.classList.toggle('active', it.dataset.id === id));

  document.getElementById('ddLabel').textContent = m.name;
  document.getElementById('ddIconHost').innerHTML = ICONS[m.id];
  document.getElementById('ddIconHost').style.color = m.accent;
  document.getElementById('modelDD').style.setProperty('--accent-active', m.accent);

  document.getElementById('hintIconHost').innerHTML = ICONS[m.id];
  document.getElementById('hintIconHost').style.color = m.accent;
  document.getElementById('hintModelName').textContent = m.name;

  document.getElementById('replyInput').placeholder = `Reply to ${m.name}...`;
}
setActive('claude');

/* ---------- API bridge: chat thread + Netlify function ---------- */
const askBtn = document.getElementById('askBtn');
const mainInputEl = document.getElementById('mainInput');
const chatCenter = document.getElementById('chatCenter');
const chatThread = document.getElementById('chatThread');
const composerCard = document.getElementById('composerCard');
const replyInput = document.getElementById('replyInput');
const replySendBtn = document.querySelector('.reply-send');

let conversationStarted = false;

function startConversation(){
  if (conversationStarted) return;
  conversationStarted = true;
  composerCard.style.display = 'none';
  chatThread.classList.add('active');
  chatCenter.classList.add('has-messages');
}

function scrollThreadToBottom(){
  chatCenter.scrollTop = chatCenter.scrollHeight;
}

function appendUserMessage(text){
  const el = document.createElement('div');
  el.className = 'msg msg-user';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  el.appendChild(bubble);
  chatThread.appendChild(el);
  scrollThreadToBottom();
}

function appendTypingBubble(modelId){
  const m = MODELS.find(x => x.id === modelId);
  const el = document.createElement('div');
  el.className = 'msg msg-ai msg-typing';
  el.innerHTML = `
    <div class="msg-meta"><span class="mini-roundel" style="color:${m.accent}">${ICONS[m.id]}</span>${m.name}</div>
    <div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
  `;
  chatThread.appendChild(el);
  scrollThreadToBottom();
  return el;
}

function appendAiMessage(text, modelId, isError){
  const m = MODELS.find(x => x.id === modelId);
  const el = document.createElement('div');
  el.className = 'msg msg-ai' + (isError ? ' msg-error' : '');
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.innerHTML = `<span class="mini-roundel" style="color:${m.accent}">${ICONS[m.id]}</span>${m.name}`;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  el.appendChild(meta);
  el.appendChild(bubble);
  chatThread.appendChild(el);
  scrollThreadToBottom();
}

async function sendMessage(promptText){
  if (!promptText) return;
  const modelForThisMessage = activeId;

  startConversation();
  appendUserMessage(promptText);
  const typingEl = appendTypingBubble(modelForThisMessage);

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: promptText, model: modelForThisMessage })
    });

    const data = await response.json();
    typingEl.remove();

    if (response.ok) {
      appendAiMessage(data.reply, modelForThisMessage, false);
    } else {
      appendAiMessage(data.error || 'Something went wrong. Please try again.', modelForThisMessage, true);
    }
  } catch (error) {
    typingEl.remove();
    appendAiMessage('Failed to connect to the backend server: ' + error.message, modelForThisMessage, true);
  }
}

askBtn.addEventListener('click', async () => {
  const promptText = mainInputEl.value.trim();
  if (!promptText) { alert('Please enter a prompt before sending.'); return; }

  const originalHTML = askBtn.innerHTML;
  askBtn.innerText = 'Thinking...';
  askBtn.disabled = true;
  mainInputEl.value = '';

  await sendMessage(promptText);

  askBtn.innerHTML = originalHTML;
  askBtn.disabled = false;
});

function sendReply(){
  const text = replyInput.value.trim();
  if (!text) return;
  replyInput.value = '';
  sendMessage(text);
}
replySendBtn.addEventListener('click', sendReply);
replyInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); sendReply(); }
});
/* ---------- composer chips fill the input ---------- */
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const input = document.getElementById('mainInput');
    input.value = chip.dataset.fill;
    input.focus();
  });
});

/* ---------- mobile sidebar drawer ---------- */
const sidebarEl = document.getElementById('sidebar');
const backdropEl = document.getElementById('sidebarBackdrop');
function openSidebar(){ sidebarEl.classList.add('open'); backdropEl.classList.add('show'); }
function closeSidebar(){ sidebarEl.classList.remove('open'); backdropEl.classList.remove('show'); }
document.getElementById('mobileMenuBtn').addEventListener('click', openSidebar);
document.getElementById('sidebarCloseBtn').addEventListener('click', closeSidebar);
backdropEl.addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });
// picking a model on mobile also closes the drawer
modelList.addEventListener('click', () => { if (window.innerWidth <= 820) closeSidebar(); });

document.getElementById('thinkingPill').addEventListener('click', function(){
  this.classList.toggle('active');
  this.style.color = this.classList.contains('active') ? 'var(--cyan-soft)' : '';
  this.style.borderColor = this.classList.contains('active') ? 'rgba(34,211,238,.5)' : '';
});
</script>
</body>
</html>
